<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENEXUS UI | Pro AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="premium-theme">

    <div class="mesh-gradient"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="drawer-overlay" id="drawer-overlay"></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-wrapper"><i data-lucide="zap" class="logo-icon"></i></div>
                <span class="logo-text">GENEXUS <small>UI</small></span>
            </div>
            <div class="nav-actions">
                <button id="btn-gallery" class="nav-btn glass"><i data-lucide="layout-grid"></i></button>
                <button id="btn-theme" class="nav-btn glass"><i data-lucide="sun"></i></button>
                <button id="btn-settings-mobile" class="nav-btn glass mobile-only"><i data-lucide="sliders-horizontal"></i></button>
            </div>
        </div>
    </nav>

    <main class="app-container">
        <aside class="sidebar-history desktop-only" id="history-sidebar">
            <div class="sidebar-header">
                <h3><i data-lucide="history"></i> Recent</h3>
                <button id="clear-history" class="btn-text">Clear</button>
            </div>
            <div class="history-list" id="history-list"></div>
        </aside>

        <section class="main-content">
            <header class="hero">
                <div class="badge">Flux-Schnell Engine</div>
                <h1 class="text-gradient">Imagine. Generate.</h1>
                <p>Professional AI Artistry.</p>
            </header>

            <div class="prompt-card glass">
                <div class="input-wrapper">
                    <textarea id="prompt-input" placeholder="Describe your masterpiece..."></textarea>
                    <div class="prompt-footer">
                        <div class="prompt-tools">
                            <button id="btn-random" class="tool-btn"><i data-lucide="shuffle"></i></button>
                            <button id="btn-clear" class="tool-btn"><i data-lucide="eraser"></i></button>
                        </div>
                        <button id="btn-generate" class="btn-primary-premium">
                            <span id="gen-text">Generate</span>
                            <div class="loader hidden" id="gen-loader"></div>
                        </button>
                    </div>
                </div>
            </div>

            <div class="results-section" id="gallery-section">
                <div class="section-header">
                    <h2>Output Gallery</h2>
                    <div class="divider"></div>
                </div>
                <div id="results-grid" class="results-grid"></div>
                <div id="empty-state" class="empty-state">
                    <div class="empty-visual"><i data-lucide="sparkles"></i></div>
                    <p>Ready for your first creation.</p>
                </div>
            </div>
        </section>

        <aside class="sidebar-settings" id="settings-drawer">
            <div class="settings-header mobile-only">
                <h3><i data-lucide="sliders-horizontal"></i> Settings</h3>
                <button id="close-settings" class="btn-close"><i data-lucide="x"></i></button>
            </div>

            <div class="settings-container">
                <div class="setting-group">
                    <label><i data-lucide="maximize"></i> Aspect Ratio</label>
                    <div class="ratio-grid" id="ratio-selector">
                        <button class="ratio-btn active" data-type="square" data-w="512" data-h="512">
                            <i data-lucide="square"></i> 1:1
                        </button>
                        <button class="ratio-btn" data-type="portrait" data-w="512" data-h="768">
                            <i data-lucide="smartphone"></i> 2:3
                        </button>
                        <button class="ratio-btn" data-type="landscape" data-w="1024" data-h="576">
                            <i data-lucide="monitor"></i> 16:9
                        </button>
                    </div>
                </div>

                <div class="setting-group">
                    <label><i data-lucide="award"></i> Quality</label>
                    <div class="quality-selector">
                        <button class="quality-btn" data-quality="low">Low</button>
                        <button class="quality-btn active" data-quality="medium">Med</button>
                        <button class="quality-btn" data-quality="high">High</button>
                    </div>
                </div>

                <div class="setting-group">
                    <label><i data-lucide="palette"></i> Style</label>
                    <select id="select-style" class="premium-select">
                        <option value="">None</option>
                        <option value="cinematic, 8k, highly detailed">Cinematic</option>
                        <option value="anime style, vibrant">Anime</option>
                        <option value="cyberpunk, neon, futuristic">Cyberpunk</option>
                        <option value="3d render, unreal engine 5">3D Render</option>
                    </select>
                </div>

                <div class="settings-row">
                    <div class="setting-group">
                        <label>Count</label>
                        <div class="count-selector">
                            <button class="count-btn active" data-count="1">1</button>
                            <button class="count-btn" data-count="2">2</button>
                            <button class="count-btn" data-count="4">4</button>
                        </div>
                    </div>
                    <div class="setting-group">
                        <label>Seed</label>
                        <input type="number" id="input-seed" class="premium-input" placeholder="Auto">
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">
                <div class="logo-wrapper footer-logo"><i data-lucide="zap" class="logo-icon"></i></div>
                <span class="footer-title">GENEXUS <small>UI</small></span>
            </div>
            <nav class="footer-links">
                <a href="about.html">About</a>
                <a href="why.html">Why</a>
                <a href="copyright.html">Copyright</a>
            </nav>
            <div class="footer-bottom">
                <p>GENEXUS UI is a demo project. Not a real product.</p>
                <a href="https://github.com/aymantaha-dev/GENEXUS-AI" target="_blank" rel="noopener" class="github-link">
                    <i data-lucide="github"></i> View on GitHub
                </a>
            </div>
        </div>
    </footer>

    <div id="toast-container"></div>
    <script src="script.js"></script>
</body>
</html>
